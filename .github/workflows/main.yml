name: Build EveVPN APK
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt-get install -y libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev libncurses5-dev libreadline6-dev libdb5.3-dev libexpat1-dev liblzma-dev libffi-dev uuid-dev
          pip install --user --upgrade buildozer Cython virtualenv

      - name: Build APK
        run: |
          # Добавляем путь к buildozer в PATH
          export PATH=$PATH:~/.local/bin
          # Принимаем лицензии Android и запускаем сборку
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EveVPN-Package
          path: bin/*.apk
